name: Automation diagnosis
description: Track a pipeline, provider, Supabase, freshness, or ML-health problem.
title: "[Automation] "
body:
  - type: markdown
    attributes:
      value: This template is also used as the human-readable counterpart of automatically generated diagnosis issues.
  - type: input
    id: pipeline
    attributes:
      label: Pipeline
      placeholder: daily-prices, daily-news, daily-outcomes...
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - provider_unavailable
        - supabase_schema
        - supabase_connection
        - freshness
        - ml_health
        - configuration
        - test_failure
        - unknown
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Include the diagnosis summary and GitHub Actions run URL. Never include secret values.
    validations:
      required: true
  - type: textarea
    id: action
    attributes:
      label: Recommended action
      description: Explain whether to retry, inspect data, change code, or prepare a PR.
    validations:
      required: true
