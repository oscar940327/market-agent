name: Daily Prices Pipeline

on:
  workflow_dispatch:
  schedule:
    # About 2 hours after the regular US market close during daylight saving time.
    # GitHub cron is UTC and does not adjust for US daylight saving time.
    - cron: "15 22 * * 1-5"

jobs:
  daily-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily prices pipeline
        run: python scripts/run_daily_pipeline.py --only prices

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline daily-prices
          --status failed
          --message "Daily prices GitHub Actions workflow failed before a pipeline alert could be sent."
          --skip-if-log-exists data/pipeline_runs/latest_daily_pipeline.json

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-prices-logs
          path: |
            data/pipeline_runs/*.json
            data/market/prices/*.csv
          if-no-files-found: ignore
