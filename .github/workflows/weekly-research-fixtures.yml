name: Weekly Research Fixtures

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    # Taiwan time: Saturday 10:30 (UTC Saturday 02:30).
    - cron: "30 2 * * 6"

jobs:
  weekly-research-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      MARKET_AGENT_ANALYST_MODE: llm
      MARKET_AGENT_LLM_PROVIDER: openrouter
      MARKET_AGENT_LLM_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_LLM_MAX_TOKENS: "4096"
      MARKET_AGENT_ROUTER_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ORCHESTRATOR_MODE: llm
      MARKET_AGENT_ORCHESTRATOR_PROVIDER: openrouter
      MARKET_AGENT_ORCHESTRATOR_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ORCHESTRATOR_MAX_STEPS: "8"
      MARKET_AGENT_ORCHESTRATOR_MAX_REPLANS: "1"
      MARKET_AGENT_TECHNICAL_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_FUNDAMENTAL_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_NEWS_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ML_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_THEME_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_RISK_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_REPORT_WRITER_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_REPORT_REVIEW_MODE: semantic
      MARKET_AGENT_REPORT_REVIEW_PROVIDER: openrouter
      MARKET_AGENT_REPORT_REVIEW_MODEL: anthropic/claude-sonnet-4.6
      MARKET_AGENT_REPORT_REVISER_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_REPORT_REVIEW_MAX_ITERATIONS: "1"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_APP_NAME: market-agent
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly research fixtures and send report
        run: >
          python scripts/log_daily_research_fixtures.py
          --report-frequency weekly
          --analyst-mode llm
          --send-email
          --query "NVDA 現在適合進場嗎"
          --query "AAPL 現在適合進場嗎"
          --query "半導體類股現在適合進場觀察嗎"
          --query "MU 放量策略以前表現怎麼樣"
          --query "MU 拉回策略以前表現怎麼樣"

      - name: Build maintenance diagnosis
        if: always()
        uses: ./.github/actions/pipeline-diagnosis
        with:
          pipeline: weekly-research-fixtures
          status: ${{ job.status }}

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline weekly-research-fixtures
          --status failed
          --message "Weekly research fixtures workflow failed."

      - name: Upload weekly research reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-research-fixture-report
          path: |
            data/research_reports/weekly_research_fixture_report_v1.*
            data/maintenance/diagnoses/*
          if-no-files-found: ignore
