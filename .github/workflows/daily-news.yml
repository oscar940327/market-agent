name: Daily News Pipeline

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    # Runs after the daily prices job window, when post-market news is usually denser.
    - cron: "30 23 * * 1-5"

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      MARKET_AGENT_LLM_PROVIDER: openrouter
      MARKET_AGENT_LLM_MODEL: openai/gpt-5.4-mini
      NEWS_EXTRACTOR_MODE: rule_based
      NEWS_LLM_PROVIDER: openrouter
      NEWS_LLM_MODEL: openai/gpt-5-mini
      NEWS_LLM_ESCALATION_MODEL: openai/gpt-5.4-mini
      NEWS_LLM_ESCALATION_ENABLED: "true"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_APP_NAME: market-agent
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily news pipeline
        run: python scripts/run_daily_pipeline.py --only news

      - name: Build maintenance diagnosis
        if: always()
        uses: ./.github/actions/pipeline-diagnosis
        with:
          pipeline: daily-news
          status: ${{ job.status }}
          input-paths: data/pipeline_runs/latest_daily_pipeline.json

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline daily-news
          --status failed
          --message "Daily news GitHub Actions workflow failed before a pipeline alert could be sent."
          --skip-if-log-exists data/pipeline_runs/latest_daily_pipeline.json

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-news-logs
          path: |
            data/pipeline_runs/*.json
            data/news/reports/*
            data/maintenance/diagnoses/*
          if-no-files-found: ignore
