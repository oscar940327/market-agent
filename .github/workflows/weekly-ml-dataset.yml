name: Weekly ML Dataset Build

on:
  workflow_dispatch:
  schedule:
    # Sunday UTC. Builds a fresh dataset artifact without replacing model files.
    - cron: "0 5 * * 0"

jobs:
  weekly-ml-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build ML training dataset
        run: python scripts/build_ml_training_dataset.py

      - name: Build ML monitoring metrics
        run: python scripts/build_ml_monitoring_metrics.py --days 90

      - name: Build ML calibration report
        run: python scripts/build_ml_calibration_report.py --days 90

      - name: Build ML drift report
        run: python scripts/build_ml_drift_report.py --recent-days 30 --baseline-days 365

      - name: Build ML model upgrade review
        run: python scripts/build_ml_model_upgrade_review.py --send-alert

      - name: Build ML health report
        run: python scripts/build_ml_health_report.py --send-alert

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline weekly-ml-dataset
          --status failed
          --message "Weekly ML dataset GitHub Actions workflow failed."

      - name: Upload ML dataset artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-ml-training-dataset
          path: |
            data/ml/training_dataset_v1.csv
            data/ml/training_dataset_v1_metadata.json
          if-no-files-found: error

      - name: Upload monitoring reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-ml-monitoring-reports
          path: data/ml/monitoring/*
          if-no-files-found: ignore
