name: Weekly ML Dataset Build

on:
  workflow_dispatch:
  schedule:
    # Sunday UTC. Builds a fresh dataset artifact without replacing model files.
    - cron: "0 5 * * 0"

jobs:
  weekly-ml-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build ML training dataset
        run: python scripts/build_ml_training_dataset.py

      - name: Upload ML dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ml-training-dataset
          path: |
            data/ml/training_dataset_v1.csv
            data/ml/training_dataset_v1_metadata.json
          if-no-files-found: error
