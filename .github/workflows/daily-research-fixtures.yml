name: Daily Research Fixtures

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    # Runs after daily prices/news have had time to update.
    # UTC does not adjust for US daylight saving time.
    - cron: "45 1 * * 2-6"

jobs:
  daily-research-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      MARKET_AGENT_ANALYST_MODE: llm
      MARKET_AGENT_LLM_PROVIDER: openrouter
      MARKET_AGENT_LLM_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ROUTER_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ORCHESTRATOR_MODE: llm
      MARKET_AGENT_ORCHESTRATOR_PROVIDER: openrouter
      MARKET_AGENT_ORCHESTRATOR_MODEL: openai/gpt-5.4
      MARKET_AGENT_ORCHESTRATOR_MAX_STEPS: "8"
      MARKET_AGENT_ORCHESTRATOR_MAX_REPLANS: "2"
      MARKET_AGENT_TECHNICAL_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_FUNDAMENTAL_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_NEWS_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_ML_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_THEME_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_RISK_MODEL: anthropic/claude-sonnet-4.6
      MARKET_AGENT_REPORT_WRITER_MODEL: openai/gpt-5.4-mini
      MARKET_AGENT_REPORT_REVIEW_MODE: semantic
      MARKET_AGENT_REPORT_REVIEW_PROVIDER: openrouter
      MARKET_AGENT_REPORT_REVIEW_MODEL: anthropic/claude-sonnet-4.6
      MARKET_AGENT_REPORT_REVIEW_MAX_ITERATIONS: "3"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_APP_NAME: market-agent
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log daily research fixtures and send report
        run: >
          python scripts/log_daily_research_fixtures.py
          --analyst-mode llm
          --send-email

      - name: Build maintenance diagnosis
        if: always()
        uses: ./.github/actions/pipeline-diagnosis
        with:
          pipeline: daily-research-fixtures
          status: ${{ job.status }}

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline daily-research-fixtures
          --status failed
          --message "Daily research fixtures workflow failed."

      - name: Upload daily research reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-research-fixture-report
          path: |
            data/research_reports/*
            data/maintenance/diagnoses/*
          if-no-files-found: ignore
