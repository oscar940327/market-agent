name: Daily Research Outcomes

on:
  workflow_dispatch:
  schedule:
    # Runs after the daily market data and news windows.
    - cron: "15 0 * * 2-6"

jobs:
  daily-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update matured research outcomes
        run: python scripts/compute_research_outcomes.py --limit 100
