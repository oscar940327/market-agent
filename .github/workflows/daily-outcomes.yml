name: Daily Research Outcomes

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    # Runs after the daily market data and news windows.
    - cron: "15 0 * * 2-6"

jobs:
  daily-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update matured research outcomes
        run: python scripts/compute_research_outcomes.py --limit 100

      - name: Build research outcome summary
        run: python scripts/build_research_outcome_summary.py --limit 1000

      - name: Update matured ML prediction outcomes
        run: python scripts/compute_ml_prediction_outcomes.py --limit 500

      - name: Build ML monitoring metrics
        run: python scripts/build_ml_monitoring_metrics.py --days 90

      - name: Build ML calibration report
        run: python scripts/build_ml_calibration_report.py --days 90

      - name: Build ML model upgrade review
        run: python scripts/build_ml_model_upgrade_review.py --send-alert

      - name: Build ML health report
        run: python scripts/build_ml_health_report.py --drift-policy scheduled_weekly --send-alert

      - name: Build maintenance diagnosis
        if: always()
        uses: ./.github/actions/pipeline-diagnosis
        with:
          pipeline: daily-outcomes
          status: ${{ job.status }}
          input-paths: data/ml/monitoring/ml_health_report_v1.json

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline daily-outcomes
          --status failed
          --message "Daily research outcomes GitHub Actions workflow failed."

      - name: Upload monitoring reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-ml-monitoring-reports
          path: |
            data/ml/monitoring/*
            data/research_reports/*
            data/maintenance/diagnoses/*
          if-no-files-found: ignore
