name: Daily ML Predictions

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional comma-separated tickers, for example MU,NVDA,AAPL."
        required: false
        default: ""
      limit:
        description: "Optional ticker limit for manual test runs."
        required: false
        default: ""
      dry_run:
        description: "Build records without writing to Supabase."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_freshness:
        description: "Skip per-ticker freshness checks for faster manual tests."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Runs after prices/news/outcomes, using the latest Supabase data.
    # GitHub cron is UTC and does not adjust for US daylight saving time.
    - cron: "30 1 * * 2-6"

jobs:
  daily-ml-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ALERT_EMAIL_ENABLED: ${{ secrets.ALERT_EMAIL_ENABLED }}
      ALERT_EMAIL_PROVIDER: gmail
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build fresh ML training dataset
        run: python scripts/build_ml_training_dataset.py

      - name: Run daily ML predictions
        shell: bash
        run: |
          ARGS=()

          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS+=(--tickers "${{ github.event.inputs.tickers }}")
          fi

          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.limit }}")
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "${{ github.event.inputs.skip_freshness }}" = "true" ]; then
            ARGS+=(--skip-freshness)
          fi

          python scripts/build_daily_ml_predictions.py "${ARGS[@]}"

      - name: Send failure alert
        if: failure()
        run: >
          python scripts/send_pipeline_alert.py
          --pipeline daily-ml-predictions
          --status failed
          --message "Daily ML predictions GitHub Actions workflow failed."

      - name: Upload ML dataset artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ml-prediction-dataset
          path: |
            data/ml/training_dataset_v1.csv
            data/ml/training_dataset_v1_metadata.json
          if-no-files-found: ignore
